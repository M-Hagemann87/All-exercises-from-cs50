<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <link href="styles.css" rel="stylesheet">


        <title>My Webpage</title>

        <script>

            let countDogs = 0;
            let countCats = 0;
            let countBoth = 0;
            function checkMultiChoice(event) {

                let button = event.target;

                if (button.innerHTML == 'Dogs') {
                button.style.backgroundColor = 'Green';
                countDogs++
                document.getElementById("dogs_button").innerHTML = `Dogs Count = ${countDogs}`;
                }
                else if (button.innerHTML == 'Cats'){
                button.style.backgroundColor = 'Green';
                countCats++
                document.getElementById("cats_button").innerHTML = `Cats Count = ${countCats}`;
                }
                else if (button.innerHTML == 'Both Equally'){
                button.style.backgroundColor = 'Green';
                countBoth++
                document.getElementById("both_button").innerHTML = `Both Count = ${countBoth}`;
                }
            }

        </script>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Survey</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="cats.html">Cat Breeds</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dogs.html">Dog Breeds</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="oddpets.html">Odd Pets</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="header">
            <h1>Survey!!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2> Which pet do you like more? </h2>
                <!-- multiple choice question here -->

                <hr>
                <button onclick="checkMultiChoice(event)">Dogs</button>
                <img src="dogs.png" height="150" alt="">
                <p id="dogs_button"></p>

                <hr>
                <button onclick="checkMultiChoice(event)">Cats</button>
                <img src="cats.png" height="150" alt="">
                <p id="cats_button"></p>

                <hr>
                <button onclick="checkMultiChoice(event)">Both Equally</button>
                <img src="both.png" height="150" alt="">
                <p id="both_button"></p>

            </div>

        </div>
    </body>
</html>
